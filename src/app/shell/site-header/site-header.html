<header class="site-header" aria-label="Primary">
  <div class="site-header__bar">
    <div class="site-header__left">
      <a class="site-header__brand" routerLink="/" aria-label="SimplifyYours home" (click)="closeMenu()">
        <span class="site-header__brand-mark" aria-hidden="true"></span>
        <span class="site-header__brand-wordmark">
          <span class="site-header__brand-prefix">Simplify</span>
          <span class="site-header__brand-suffix">Yours</span>
        </span>
      </a>
      <nav class="site-header__nav" aria-label="Main navigation">
        @for (link of currentNavLinks(); track link.path) {
          <a
            class="site-header__nav-link"
            [routerLink]="link.path"
            routerLinkActive="site-header__nav-link--active"
          >{{ link.label }}</a>
        }
      </nav>
    </div>

    <div class="site-header__actions">
      @if (isSignedIn()) {
        <button
          type="button"
          class="site-header__notif"
          aria-label="Notifications"
        >
          <svg
            class="site-header__notif-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          @if (hasUnreadNotifications()) {
            <span class="site-header__notif-dot" aria-hidden="true"></span>
          }
        </button>
        <div class="site-header__avatar-pill">
          <span class="site-header__avatar-initial" aria-hidden="true">{{ initial() }}</span>
          <span class="site-header__avatar-name">{{ firstName() }}</span>
          <svg
            class="site-header__avatar-chevron"
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      } @else {
        <button type="button" class="site-header__sign-in" (click)="onSignInClick()">Sign in</button>
        <a class="site-header__sign-up" routerLink="/signup" (click)="closeMenu()">
          <span>Sign up</span>
          <span class="site-header__sign-up-arrow" aria-hidden="true">&rarr;</span>
        </a>
      }
      <button
        #hamburger
        type="button"
        class="site-header__hamburger"
        [class.site-header__hamburger--open]="menuOpen()"
        [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="site-header-menu"
        (click)="toggleMenu()"
      >
        @if (menuOpen()) {
          <svg
            class="site-header__hamburger-icon"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        } @else {
          <svg
            class="site-header__hamburger-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        }
      </button>
    </div>
  </div>

  <nav
    id="site-header-menu"
    class="site-header__menu"
    [class.site-header__menu--open]="menuOpen()"
    role="navigation"
    aria-label="Mobile menu"
  >
    <div class="site-header__menu-links">
      @for (link of currentNavLinks(); track link.path) {
        <a
          class="site-header__menu-link"
          [routerLink]="link.path"
          routerLinkActive="site-header__menu-link--active"
          (click)="closeMenu()"
        >{{ link.label }}</a>
      }
    </div>
    @if (!isSignedIn()) {
      <button
        type="button"
        class="site-header__menu-sign-in"
        (click)="onSignInClick()"
      >
        <span class="site-header__menu-sign-in-label">Sign in</span>
      </button>
      <a class="site-header__menu-cta" routerLink="/signup" (click)="closeMenu()">
        <span>Create an account</span>
        <span class="site-header__menu-cta-arrow" aria-hidden="true">&rarr;</span>
      </a>
    }
  </nav>
</header>
