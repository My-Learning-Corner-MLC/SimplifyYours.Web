name: Web App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies, lint, build, and test
        run: npm ci
      - name: Lint
        run: npx ng lint
      - name: Build
        run: npx ng build --configuration production
      - name: Test
        run: npx ng test --watch=false --coverage
      - name: Diff coverage (changed lines only, fail under 50%)
        if: github.event_name == 'pull_request'
        run: |
          pipx install diff-cover
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          diff-cover coverage/lcov.info \
            --compare-branch="origin/${{ github.event.pull_request.base.ref }}" \
            --fail-under=50
